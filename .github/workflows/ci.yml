name: CI

on:
  pull_request:
  push:
    branches: [main]

env:
  IMAGE: ghcr.io/voriteam/ditto-mcp

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - run: go test -race -v ./...

  format:
    name: Format & Vet
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: gofmt
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "::error::The following files are not gofmt'd:"
            echo "$unformatted"
            exit 1
          fi
      - name: go mod tidy
        run: |
          go mod tidy
          if ! git diff --quiet go.mod go.sum; then
            echo "::error::go.mod / go.sum are not tidy. Run 'go mod tidy' locally."
            git diff go.mod go.sum
            exit 1
          fi
      - run: go vet ./...

  build:
    name: Build (${{ matrix.platform }})
    needs: [test, format]
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: warp-ubuntu-latest-x64-4x
            cache_tag: buildcache-amd64
          - platform: linux/arm64
            runner: warp-ubuntu-latest-arm64-4x
            cache_tag: buildcache-arm64
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build (PR validation)
        if: github.event_name == 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          push: false
          build-args: |
            COMMIT_SHA=${{ github.sha }}
          cache-from: type=registry,ref=${{ env.IMAGE }}:${{ matrix.cache_tag }}

      - name: Build and push by digest
        id: build
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=${{ env.IMAGE }},push-by-digest=true,name-canonical=true,push=true
          build-args: |
            COMMIT_SHA=${{ github.sha }}
          cache-from: type=registry,ref=${{ env.IMAGE }}:${{ matrix.cache_tag }}
          cache-to: type=registry,ref=${{ env.IMAGE }}:${{ matrix.cache_tag }},mode=max

      - name: Export digest
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ matrix.platform == 'linux/amd64' && 'amd64' || 'arm64' }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    name: Merge manifest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: warp-ubuntu-latest-x64-2x
    permissions:
      contents: read
      packages: write

    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create multiarch manifest and push
        working-directory: /tmp/digests
        run: |
          SHORT_SHA=${GITHUB_SHA:0:7}
          docker buildx imagetools create \
            -t "$IMAGE:latest" \
            -t "$IMAGE:$GITHUB_SHA" \
            -t "$IMAGE:$SHORT_SHA" \
            $(printf "$IMAGE@sha256:%s " *)
